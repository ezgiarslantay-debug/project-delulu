function dayNum(d){return Math.floor((d-START)/864e5)+1}

}

setChecks(p=>({...p,[k]:{...(p[k]||{}),[id]:!(p[k]||{})[id]}}));
}

setJournal(p=>[{id:Date.now(),text:newEntry.trim(),date:new Date().toISOString()},...p]);

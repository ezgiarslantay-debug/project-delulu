const START_DATE=new Date(2026,2,16);
const END_DATE=new Date(2026,3,26);

function generateDays(){const days=[];let d=new Date(2026,2,16);while(d<=END_DATE){days.push(new Date(d));d.setDate(d.getDate()+1)}return days}
const ALL_DAYS=generateDays();
function getDayNumber(date){return Math.floor((date-START_DATE)/(1000*60*60*24))+1}
function isWeekend(date){return date.getDay()===0||date.getDay()===6}
function formatDate(date){return date.toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function formatDay(date){return date.toLocaleDateString("en-US",{weekday:"short"})}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function dateKey(d){return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()}

// localStorage helpers
function loadJSON(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback}catch(e){return fallback}}
function saveJSON(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}

function App(){
const[activeTab,setActiveTab]=useState("today");
const today=new Date();
const closestDay=ALL_DAYS.reduce((prev,curr)=>Math.abs(curr-today)<Math.abs(prev-today)?curr:prev);
const[selectedDate,setSelectedDate]=useState(closestDay);
const[completions,setCompletions]=useState(()=>loadJSON("pd_completions",{}));
const[savedExperiences,setSavedExperiences]=useState(()=>loadJSON("pd_saved",[]));
const[goalProgress,setGoalProgress]=useState(()=>loadJSON("pd_goals",BOOTCAMP_GOALS.reduce((a,g)=>({...a,[g.id]:0}),{})));
const[browseFilter,setBrowseFilter]=useState("All");
const[browseMode,setBrowseMode]=useState("browse");
const[goalEditing,setGoalEditing]=useState(null);
const[showAffirmation,setShowAffirmation]=useState(false);
const[currentAffirmation,setCurrentAffirmation]=useState(0);
const[confetti,setConfetti]=useState([]);

// Persist to localStorage
useEffect(()=>{saveJSON("pd_completions",completions)},[completions]);
useEffect(()=>{saveJSON("pd_saved",savedExperiences)},[savedExperiences]);
useEffect(()=>{saveJSON("pd_goals",goalProgress)},[goalProgress]);

function triggerConfetti(){
const p=Array.from({length:12},(_,i)=>({id:Date.now()+i,x:Math.random()*100,delay:Math.random()*0.3,color:["#D4A574","#8B9E7C","#C4956A","#A67C5B","#E8D5C0"][Math.floor(Math.random()*5)]}));
setConfetti(p);setTimeout(()=>setConfetti([]),1200);
}

function toggleHabit(habitId){
const key=dateKey(selectedDate);
const current=completions[key]||{};
if(!current[habitId])triggerConfetti();
setCompletions(prev=>{const dayData=prev[key]||{};return{...prev,[key]:{...dayData,[habitId]:!dayData[habitId]}}});
}

function getDayCompletions(date){return completions[dateKey(date)]||{}}
function getDayProgress(date){
const dc=getDayCompletions(date);const wk=isWeekend(date);
const applicable=DAILY_HABITS.filter(h=>!wk||!h.weekdayOnly);
const done=applicable.filter(h=>dc[h.id]).length;
return applicable.length>0?done/applicable.length:0;
}
function getOverallProgress(){
let total=0,done=0;
ALL_DAYS.forEach(d=>{const dc=getDayCompletions(d);const wk=isWeekend(d);const applicable=DAILY_HABITS.filter(h=>!wk||!h.weekdayOnly);total+=applicable.length;done+=applicable.filter(h=>dc[h.id]).length});
return total>0?done/total:0;
}
function getCompletedDaysCount(){return ALL_DAYS.filter(d=>getDayProgress(d)===1).length}
function toggleSaveExperience(id){setSavedExperiences(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])}
function cycleAffirmation(){setCurrentAffirmation(p=>(p+1)%AFFIRMATIONS.length);setShowAffirmation(true);setTimeout(()=>setShowAffirmation(false),3000)}

const currentDayNumber=getDayNumber(today);
const totalDays=42;
const daysRemaining=Math.max(0,Math.ceil((END_DATE-today)/(1000*60*60*24)));
const sprintProgress=Math.min(1,Math.max(0,currentDayNumber/totalDays));
const dayProgress=getDayProgress(selectedDate);
const dayCompletions_=getDayCompletions(selectedDate);
const weekend=isWeekend(selectedDate);
const applicableHabits=DAILY_HABITS.filter(h=>!weekend||!h.weekdayOnly);
const filteredExperiences=browseMode==="saved"?EXPERIENCES.filter(x=>savedExperiences.includes(x.id)):browseFilter==="All"?EXPERIENCES:EXPERIENCES.filter(x=>x.category===browseFilter);
